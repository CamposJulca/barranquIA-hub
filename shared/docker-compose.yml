# Build context: raíz del repo (.. desde shared/)
# El nginx del sistema en :9005 actúa como gateway y proxya a estos contenedores.

services:

  # ── BASE DE DATOS ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: barranquia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-barranquia_hub}
      POSTGRES_USER:     ${DB_USER:-barranquia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Barranquia2024Hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ruta-ia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-barranquia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── HUB BACKEND (Django central — host:8006 → container:8005) ────────────
  hub-backend:
    build:
      context: ..
      dockerfile: hub/infra/docker/Dockerfile.backend
    container_name: barranquia_hub_backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8006:8005"
    networks:
      - ruta-ia-net
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  # ── SERVIPARAMO BACKEND (Django autónomo — host:8001 → container:8001) ───
  serviparamo-backend:
    build:
      context: ..
      dockerfile: serviparamo/infra/Dockerfile.backend
    container_name: barranquia_serviparamo_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: serviparamo
      DB_USER: ${SERVIPARAMO_DB_USER:-serviparamo}
      DB_PASSWORD: ${SERVIPARAMO_DB_PASSWORD:-serviparamo2024}
      SECRET_KEY: ${SERVIPARAMO_SECRET_KEY:-fallback-insecure-key}
      SERVIPARAMO_ERP_PASS: ${SERVIPARAMO_ERP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - ruta-ia-net
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  # ── SERVIPARAMO FRONTEND (React SPA — host:9021 → container:80) ──────────
  serviparamo-frontend:
    build:
      context: ..
      dockerfile: serviparamo/infra/Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_API_TIMEOUT: "15000"
    container_name: barranquia_serviparamo_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9021:80"
    networks:
      - ruta-ia-net

  # ── AVANTIKA BACKEND (Django autónomo — host:8012 → container:8002) ──────
  avantika-backend:
    build:
      context: ..
      dockerfile: avantika/infra/Dockerfile.backend
    container_name: barranquia_avantika_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: avantika
      DB_USER: ${AVANTIKA_DB_USER:-avantika}
      DB_PASSWORD: ${AVANTIKA_DB_PASSWORD:-avantika2024}
      SECRET_KEY: ${AVANTIKA_SECRET_KEY:-fallback-insecure-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8012:8002"
    networks:
      - ruta-ia-net

  # ── AVANTIKA FRONTEND (React SPA — host:9022 → container:80) ─────────────
  avantika-frontend:
    build:
      context: ..
      dockerfile: avantika/infra/Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_API_TIMEOUT: "15000"
    container_name: barranquia_avantika_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9022:80"
    networks:
      - ruta-ia-net

  # ── JOZ BACKEND (Django autónomo — host:8003 → container:8003) ───────────
  joz-backend:
    build:
      context: ..
      dockerfile: joz/infra/Dockerfile.backend
    container_name: barranquia_joz_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: joz
      DB_USER: ${JOZ_DB_USER:-joz}
      DB_PASSWORD: ${JOZ_DB_PASSWORD:-joz2024}
      SECRET_KEY: ${JOZ_SECRET_KEY:-fallback-insecure-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8003:8003"
    networks:
      - ruta-ia-net

  # ── JOZ FRONTEND (React SPA — host:9023 → container:80) ──────────────────
  joz-frontend:
    build:
      context: ..
      dockerfile: joz/infra/Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_API_TIMEOUT: "15000"
    container_name: barranquia_joz_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9023:80"
    networks:
      - ruta-ia-net

networks:
  ruta-ia-net:
    driver: bridge

volumes:
  postgres_data:
  huggingface_cache:
