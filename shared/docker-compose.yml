# Build context raíz del repo (..  desde docker/).
# Así cada Dockerfile puede referenciar cualquier archivo del proyecto.

services:

  # ── BASE DE DATOS ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: barranquia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-barranquia_hub}
      POSTGRES_USER:     ${DB_USER:-barranquia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Barranquia2024Hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ruta-ia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-barranquia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── HUB BACKEND (Django — gateway central) ───────────────────────────────
  hub-backend:
    build:
      context: ..
      dockerfile: hub/infra/docker/Dockerfile.backend
    container_name: barranquia_hub_backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      # En Docker el host de BD es el servicio, no localhost
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8005:8005"
    networks:
      - ruta-ia-net
    volumes:
      # sentence-transformers descarga modelos en ~/.cache/huggingface
      # Persistir evita re-descargas en cada restart
      - huggingface_cache:/root/.cache/huggingface

  # ── SERVIPARAMO BACKEND (Django autónomo — puerto 8001) ──────────────────
  serviparamo-backend:
    build:
      context: ..
      dockerfile: serviparamo/infra/Dockerfile.backend
    container_name: barranquia_serviparamo_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: serviparamo
      DB_USER: ${SERVIPARAMO_DB_USER:-serviparamo}
      DB_PASSWORD: ${SERVIPARAMO_DB_PASSWORD:-serviparamo2024}
      SECRET_KEY: ${SERVIPARAMO_SECRET_KEY:-fallback-insecure-key}
      SERVIPARAMO_ERP_PASS: ${SERVIPARAMO_ERP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    networks:
      - ruta-ia-net
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  # ── SERVIPARAMO FRONTEND (React SPA) ────────────────────────────────────
  serviparamo-frontend:
    build:
      context: ..
      dockerfile: serviparamo/infra/Dockerfile.frontend
      args:
        VITE_API_URL: ""          # Vacío → Axios usa rutas relativas → pasan por nginx
        VITE_API_TIMEOUT: "15000"
    container_name: barranquia_serviparamo_frontend
    restart: unless-stopped
    networks:
      - ruta-ia-net

  # ── AVANTIKA BACKEND (Django autónomo — puerto 8002) ─────────────────────
  avantika-backend:
    build:
      context: ..
      dockerfile: avantika/infra/Dockerfile.backend
    container_name: barranquia_avantika_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: avantika
      DB_USER: ${AVANTIKA_DB_USER:-avantika}
      DB_PASSWORD: ${AVANTIKA_DB_PASSWORD:-avantika2024}
      SECRET_KEY: ${AVANTIKA_SECRET_KEY:-fallback-insecure-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8002:8002"
    networks:
      - ruta-ia-net

  # ── AVANTIKA FRONTEND (React SPA) ────────────────────────────���───────────
  avantika-frontend:
    build:
      context: ..
      dockerfile: avantika/infra/Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_API_TIMEOUT: "15000"
    container_name: barranquia_avantika_frontend
    restart: unless-stopped
    networks:
      - ruta-ia-net

  # ── JOZ BACKEND (Django autónomo — puerto 8003) ───────────────────────────
  joz-backend:
    build:
      context: ..
      dockerfile: joz/infra/Dockerfile.backend
    container_name: barranquia_joz_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: joz
      DB_USER: ${JOZ_DB_USER:-joz}
      DB_PASSWORD: ${JOZ_DB_PASSWORD:-joz2024}
      SECRET_KEY: ${JOZ_SECRET_KEY:-fallback-insecure-key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8003:8003"
    networks:
      - ruta-ia-net

  # ── JOZ FRONTEND (React SPA) ──────────────────────────────────────────────
  joz-frontend:
    build:
      context: ..
      dockerfile: joz/infra/Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_API_TIMEOUT: "15000"
    container_name: barranquia_joz_frontend
    restart: unless-stopped
    networks:
      - ruta-ia-net

  # ── NGINX (reverse proxy) ─────────────────────────────────────���───────────
  nginx:
    image: nginx:alpine
    container_name: barranquia_nginx
    restart: unless-stopped
    ports:
      - "9005:9005"
    volumes:
      - ../hub/infra/server/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hub-backend
      - serviparamo-backend
      - serviparamo-frontend
      - avantika-backend
      - avantika-frontend
      - joz-backend
      - joz-frontend
    networks:
      - ruta-ia-net

networks:
  ruta-ia-net:
    driver: bridge

volumes:
  postgres_data:
  huggingface_cache:
