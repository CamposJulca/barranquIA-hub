server {
    listen 9005;
    server_name barranquia-hub.ngrok.io 192.168.0.101 localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # API proxy to Django/Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Módulo Avantika (FastAPI - Daniel)
    location /avantika/ {
        proxy_pass http://127.0.0.1:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Módulo ServiPáramo (FastAPI - Daniel)
    location /serviparamo/ {
        proxy_pass http://127.0.0.1:9002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Módulo Joz (FastAPI - Daniel)
    location /joz/ {
        proxy_pass http://127.0.0.1:9003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        alias /home/desarrollo/barranquIA-clean/backend/hub/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React frontend (SPA catch-all)
    location / {
        root /home/desarrollo/barranquIA-clean/backend/hub/staticfiles/frontend;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }
}
