# BarranquIA Hub — nginx gateway (modo producción bare-metal)
# Aplica con: sudo cp hub/infra/server/nginx/barranquia-hub.conf /etc/nginx/sites-enabled/barranquia-hub
# Luego: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 9005;
    server_name barranquia-hub.ngrok.io 192.168.0.101 localhost;

    client_max_body_size 20M;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── API ServiPáramo → Docker backend :8001 ────────────────────────────
    location /api/serviparamo/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── API Avantika → Docker backend :8012 ──────────────────────────────
    location /api/avantika/ {
        proxy_pass         http://127.0.0.1:8012;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── API Joz → Docker backend :8003 ───────────────────────────────────
    location /api/joz/ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── API Hub → Docker backend :8006 ───────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8006;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── ServiPáramo frontend → Docker frontend :9021 ─────────────────────
    location /serviparamo/ {
        proxy_pass       http://127.0.0.1:9021/;
        proxy_set_header Host $host;
    }

    # ── Avantika frontend → Docker frontend :9022 ────────────────────────
    location /avantika/ {
        proxy_pass       http://127.0.0.1:9022/;
        proxy_set_header Host $host;
    }

    # ── Joz frontend → Docker frontend :9023 ─────────────────────────────
    location /joz/ {
        proxy_pass       http://127.0.0.1:9023/;
        proxy_set_header Host $host;
    }

    # ── Admin Django (hub) ────────────────────────────────────────────────
    location /admin/ {
        proxy_pass       http://127.0.0.1:8006;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Archivos estáticos Django ─────────────────────────────────────────
    location /static/ {
        proxy_pass       http://127.0.0.1:8006/static/;
        proxy_set_header Host $host;
        expires          30d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Hub React SPA (catch-all) ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8006;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
