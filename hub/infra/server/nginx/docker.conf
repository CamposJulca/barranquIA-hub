# nginx.conf — modo Docker (usa nombres de contenedor en lugar de 127.0.0.1)
# Montado por docker-compose como /etc/nginx/conf.d/default.conf

server {
    listen 9005;
    server_name barranquia-hub.ngrok.io 192.168.0.101 localhost;

    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── API ServiPáramo → microservicio independiente (puerto 8001) ───────────
    location /api/serviparamo/ {
        proxy_pass         http://serviparamo-backend:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── API → Django hub ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://hub-backend:8005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── API Avantika → microservicio independiente (puerto 8002) ─────────────
    location /api/avantika/ {
        proxy_pass         http://avantika-backend:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── API Joz → microservicio independiente (puerto 8003) ───────────────────
    location /api/joz/ {
        proxy_pass         http://joz-backend:8003;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── ServiPáramo frontend (React SPA servida en /serviparamo/) ─────────────
    # El trailing slash en proxy_pass stripea el prefijo /serviparamo/
    # antes de enviarlo al contenedor frontend.
    location /serviparamo/ {
        proxy_pass       http://serviparamo-frontend:80/;
        proxy_set_header Host $host;
    }

    # ── Avantika frontend (React SPA) ────────────────────────────────────────
    location /avantika/ {
        proxy_pass       http://avantika-frontend:80/;
        proxy_set_header Host $host;
    }

    # ── Joz frontend (React SPA) ──────────────────────────────────────────────
    location /joz/ {
        proxy_pass       http://joz-frontend:80/;
        proxy_set_header Host $host;
    }

    # ── Admin Django ──────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass       http://hub-backend:8005;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Archivos estáticos Django (WhiteNoise en prod los sirve desde /static/) ─
    location /static/ {
        proxy_pass       http://hub-backend:8005/static/;
        proxy_set_header Host $host;
        expires          30d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Hub React SPA (catch-all) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://hub-backend:8005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
